name: CI

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: read

jobs:
  ci:
    uses: rarebit-one/.github/.github/workflows/reusable-gem-ci.yml@v1
    with:
      ruby-versions: '["3.2.9","3.4.4","4.0.1"]'
      lint-ruby-version: "4.0.1"
      extra-lint-commands: |
        gem install bundler-audit
        bundler-audit check --update
