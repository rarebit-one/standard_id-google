name: CI

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: read

jobs:
  ci:
    uses: rarebit-one/.github/.github/workflows/reusable-gem-ci.yml@v1
    with:
      ruby-versions: '["4.0.0","4.0.1","4.0.2","4.0.3","4.0.4"]'
      lint-ruby-version: "4.0.4"
      # Pass --config explicitly so rubocop skips its .ruby-version
      # auto-discovery, which fails on Ruby 4.0 with rubocop < 1.82
      # (KNOWN_RUBIES tops out at 3.5). Mirrors standard_id's bin/rubocop.
      lint-command: bundle exec rubocop --config .rubocop.yml -f github
      extra-lint-commands: |
        gem install bundler-audit
        bundler-audit check --update
